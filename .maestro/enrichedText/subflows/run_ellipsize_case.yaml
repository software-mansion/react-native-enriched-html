appId: swmansion.enriched.example
---
- tapOn:
    id: "number-of-lines-${NOL_BUTTON}-button"

- assertVisible: "numberOfLines: ${NOL_LABEL}"

- tapOn:
    id: "ellipsize-${ELLIPSIZE_MODE}-button"

- assertVisible: "ellipsizeMode: ${ELLIPSIZE_MODE}"

- runFlow:
    file: "./capture_or_assert_screenshot.yaml"
    env:
      SCREENSHOT_NAME: "${SCREENSHOT_NAME}"
