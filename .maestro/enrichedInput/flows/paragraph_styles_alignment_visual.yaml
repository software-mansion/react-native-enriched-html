appId: swmansion.enriched.example
---
# Visually validates text alignment rendering
- launchApp

- tapOn:
    id: 'toggle-screen-button'

- tapOn:
    id: 'editor-input'

# Left-aligned text
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Left aligned'
- pressKey: Enter

# Centre-aligned
- tapOn:
    id: 'toolbar-align-center'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Centre aligned'
- pressKey: Enter

# Heading 6
- tapOn:
    id: 'toolbar-heading-6'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Heading 6'
- pressKey: Enter

# Right-aligned text
- tapOn:
    id: 'toolbar-align-right'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Right aligned'
- pressKey: Enter

# List with right-aligned items
- tapOn:
    id: 'toolbar-ordered-list'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Element 1'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Element 2'

- runFlow:
    file: '../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'paragraph_styles_alignment'
