appId: swmansion.enriched.example
# Tests scrollability when content is set via setValue
---
- launchApp

- tapOn:
    id: "toggle-screen-button"

- runFlow:
    file: "../subflows/set_editor_value.yaml"
    env:
      VALUE: >-
        <html>
          <p>Line one</p>
          <p>Line two</p>
          <p>Line three</p>
          <p>Line four</p>
          <p>Line five</p>
          <p>Line six</p>
          <p>Line seven</p>
          <p>Line eight</p>
          <p>Line nine</p>
          <p>Line ten</p>
        </html>

# iOS starts at top - screenshot top, then swipe to bottom
- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          file: "../subflows/capture_or_assert_screenshot.yaml"
          env:
            SCREENSHOT_NAME: "scrolling_set_value_top"
      - tapOn:
          id: "focus-button"
      - swipe:
          from:
            id: "editor-input"
          direction: UP
      - runFlow:
          file: "../subflows/capture_or_assert_screenshot.yaml"
          env:
            SCREENSHOT_NAME: "scrolling_set_value_bottom"

# Android starts at bottom - screenshot bottom, then swipe to top
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          file: "../subflows/capture_or_assert_screenshot.yaml"
          env:
            SCREENSHOT_NAME: "scrolling_set_value_bottom"
      - tapOn:
          id: "focus-button"
      - swipe:
          from:
            id: "editor-input"
          direction: DOWN
      - runFlow:
          file: "../subflows/capture_or_assert_screenshot.yaml"
          env:
            SCREENSHOT_NAME: "scrolling_set_value_top"
