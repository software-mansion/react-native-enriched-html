appId: swmansion.enriched.example
---
# PR #306 - fix: handle conflicts between paragraphs
- launchApp

- tapOn:
    id: "toggle-screen-button"

- tapOn:
    id: "editor-input"

- tapOn:
    id: "toolbar-code-block"
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: "Code text"
- pressKey: Enter

- tapOn:
    id: "toolbar-code-block"
- tapOn:
    id: "toolbar-heading-1"
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: "H1"

# Position cursor at start of H1 line
- tapOn:
    id: "editor-input"
    point: "5%,75%"

- pressKey: Backspace

- runFlow:
    commands:
        - pressKey: Backspace
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: " "

- tapOn:
    id: "editor-input"
    point: "75%, 50%"

- pressKey: Enter
- tapOn:
    id: "toolbar-code-block"

- tapOn:
    id: "toolbar-inline-code"
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: "Inline code"

- tapOn:
    id:  "editor-input"
    point: "5%, 75%"

- pressKey: Backspace
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: " "

- runFlow:
    file: "../subflows/capture_or_assert_screenshot.yaml"
    env:
      SCREENSHOT_NAME: "conflicting_paragraph_merge"
