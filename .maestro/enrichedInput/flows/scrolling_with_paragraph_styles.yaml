appId: swmansion.enriched.example
# Tests scrolling with mixed block formatting (lists, quotes)
---
- launchApp

- tapOn:
    id: 'toggle-screen-button'

- tapOn:
    id: 'editor-input'

- tapOn:
    id: 'toolbar-unordered-list'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Bullet item one'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Bullet item two'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Bullet item three'
- pressKey: Enter
- pressKey: Enter

- tapOn:
    id: 'toolbar-quote'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Quoted line one'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Quoted line two'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Quoted line three'
- pressKey: Enter
- tapOn:
    id: 'toolbar-quote'

- tapOn:
    id: 'toolbar-ordered-list'
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Numbered item one'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Numbered item two'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Numbered item three'
- pressKey: Enter
- pressKey: Enter

- pressKey: Backspace

- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Plain text line one'
- pressKey: Enter
- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: 'Plain text final'

- swipe:
    from:
      id: 'editor-input'
    direction: DOWN

- runFlow:
    file: '../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'scrolling_paragraph_styles_top'

- tapOn:
    id: 'focus-button'

- tapOn:
    id: 'editor-input'
    point: '0%,0%'

- swipe:
    from:
      id: 'editor-input'
    direction: UP

- runFlow:
    file: '../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'scrolling_paragraph_styles_bottom'
