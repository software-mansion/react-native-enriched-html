appId: swmansion.enriched.example
---

- tapOn:
    id: "set-value-button"

- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "value-modal-input"
    timeout: 10000

- tapOn:
    id: "value-modal-input"

- runFlow:
    file: '../../subflows/input_text.yaml'
    env:
      TEXT: ${VALUE}

- tapOn:
    id: "value-modal-submit-button"
